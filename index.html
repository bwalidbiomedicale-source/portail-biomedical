const {useState, useMemo, useRef, useEffect} = React;

// ─── STORAGE LAYER: Firebase if configured, else localStorage ───
function usePersistedState(key, initial) {
  var [val, setVal] = useState(function() {
    if (!window.firebaseReady) {
      try { var s = localStorage.getItem("chp_"+key); if(s) return JSON.parse(s); } catch(e){}
    }
    return initial;
  });
  var [loaded, setLoaded] = useState(!window.firebaseReady);

  useEffect(function() {
    if (window.firebaseReady) {
      return window.fbListen(key, function(data) {
        if (data !== null) { setVal(data); }
        else if (!loaded) { window.fbWrite(key, initial); setVal(initial); }
        setLoaded(true);
      });
    }
  }, []);

  function update(newVal) {
    var v = typeof newVal === "function" ? newVal(val) : newVal;
    setVal(v);
    if (window.firebaseReady) { window.fbWrite(key, v); }
    else { try { localStorage.setItem("chp_"+key, JSON.stringify(v)); } catch(e){} }
  }
  return [val, update, loaded];
}

      {open&&q.length>=2&&res.length===0&&<div className="dd"><div className="de">Aucun équipement trouvé</div></div>}

function SuiviReforme(props) {
  var [detail,setDetail]=useState(null);

  var allSts=["soumise","en_cours","validee","rejetee"];
  var stats={}; raw.forEach(function(d){stats[d.service]=(stats[d.service]||0)+1});
  function doExport(list,fname,title){
    var wb=XLSX.utils.book_new();
    var svFilter=props.fSvc!=="all"?(window.SVCS.find(function(x){return x.id===props.fSvc})||{}).label:"Tous les services";
    var header=[
      ["Centre Hospitalier Provincial de Tata — CHP Tata"],
      ["Ministère de la Santé et de la Protection Sociale"],
      [""],
      [title||"Suivi des Réformes d'Équipement"],
      ["Service: "+svFilter,"","","Date d'export: "+new Date().toISOString().slice(0,10)],
      ["Total: "+list.length+" enregistrement(s)"],
      [""]
    ];
    var cols=["Référence","Date","Service","Équipement","Marque","Modèle","N° Série","N° Inventaire","Motif de Réforme","Statut","Demandeur"];
    var rows=list.map(function(d){ var sv=window.SVCS.find(function(x){return x.id===d.service}); return[d.id,d.date,sv?sv.label:d.service,d.eq,d.eqMarque||"",d.eqModel||"",d.eqSerie||"",d.eqInv||"",d.motif||"",window.STL[d.statut]||d.statut,d.who||""] });
    var sheetData=header.concat([cols]).concat(rows);
    var ws=XLSX.utils.aoa_to_sheet(sheetData);
    ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:cols.length-1}},{s:{r:1,c:0},e:{r:1,c:cols.length-1}},{s:{r:3,c:0},e:{r:3,c:cols.length-1}},{s:{r:5,c:0},e:{r:5,c:cols.length-1}}];
    ws["!cols"]=cols.map(function(c){return{wch:c.length<12?16:c.length+4}});
    XLSX.utils.book_append_sheet(wb,ws,"Reformes");
    XLSX.writeFile(wb,fname);
  }
  function svLabel(svcId){var sv=window.SVCS.find(function(x){return x.id===svcId});return sv?sv.label:svcId}
  var svFilterLabel=props.fSvc!=="all"?(window.SVCS.find(function(x){return x.id===props.fSvc})||{}).label:null;
  var exportTitle="Suivi des Réformes";
  if(svFilterLabel) exportTitle+=" — "+svFilterLabel;
  return (
    <div>
      <div className="ph"><span className="pb pb-p">♻️ Suivi des réformes</span><h2>Équipements à réformer</h2></div>
      <div className="ab">
        <button className="pr" onClick={function(){doExport(data,"Suivi_Reformes_CHP_Tata.xlsx",exportTitle)}}>📥 Télécharger Excel ({data.length})</button>
        {props.isBio && <button onClick={function(){doExport(raw,"Reformes_COMPLET_CHP_Tata.xlsx")}}>📊 Export complet ({raw.length})</button>}
      </div>
      <div className="cd"><div className="st">Répartition par service</div><div className="stg">
        {window.SVCS.filter(function(s){return stats[s.id]}).map(function(s){ return <div key={s.id} className={"stc"+(props.fSvc===s.id?" ac":"")} onClick={function(){props.setFSvc(props.fSvc===s.id?"all":s.id)}}><div style={{fontSize:"20px"}}>{s.icon}</div><div className="stn">{stats[s.id]}</div><div className="stl">{s.label}</div></div> })}
        <div className={"stc"+(props.fSvc==="all"?" ac":"")} onClick={function(){props.setFSvc("all")}}><div style={{fontSize:"20px"}}>📊</div><div className="stn">{raw.length}</div><div className="stl">Total</div></div>
      </div></div>
      <div className="fb">
        <select className="fs" value={props.fSvc} onChange={function(e){props.setFSvc(e.target.value)}}><option value="all">Tous les services</option>{window.SVCS.map(function(s){return <option key={s.id} value={s.id}>{s.label}</option>})}</select>
        <select className="fs" value={props.fSt} onChange={function(e){props.setFSt(e.target.value)}}><option value="all">Tous les statuts</option>{allSts.map(function(s){return <option key={s} value={s}>{window.STL[s]}</option>})}</select>
        <span style={{fontSize:"12px",color:"var(--text3)"}}>{data.length} résultat(s)</span>
      </div>
      <div className="tw"><table><thead><tr><th>Réf</th><th>Date</th><th>Service</th><th>Équipement</th><th>Motif</th><th>Statut</th>{props.isBio&&<th>Actions</th>}</tr></thead><tbody>
        {data.map(function(d){ var sv=window.SVCS.find(function(x){return x.id===d.service}); return <tr key={d.id} className="clickable" onClick={function(){setDetail(d)}}>
          <td><span style={{fontWeight:700,color:"#a78bfa",fontSize:"12px",fontFamily:"monospace"}}>{d.id}</span></td>
          <td>{d.date}</td><td>{sv?sv.icon:""} {sv?sv.label:""}</td>
          <td style={{fontWeight:600,color:"var(--text)"}}>{d.eq}</td>
          <td style={{maxWidth:"200px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.motif}</td>
          <td><span className={"pb "+(d.statut==="soumise"?"pb-b":d.statut==="validee"?"pb-g":d.statut==="rejetee"?"pb-r":"")} style={{background:d.statut==="en_cours"?"var(--amber2)":"",color:d.statut==="en_cours"?"var(--amber)":""}}>{window.STL[d.statut]||d.statut}</span></td>
          {props.isBio&&<td style={{display:"flex",gap:"6px",alignItems:"center"}} onClick={function(e){e.stopPropagation()}}>
            <select className="fs" style={{fontSize:"11px",padding:"4px 6px"}} value={d.statut} onChange={function(e){props.chgSt(d.id,e.target.value)}}>{allSts.map(function(s){return <option key={s} value={s}>{window.STL[s]}</option>})}</select>
            <button style={{padding:"4px 8px",fontSize:"11px",border:"1px solid var(--border)",background:"var(--bg)",color:"var(--red)",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit"}} onClick={function(){if(confirm("Supprimer "+d.id+" ?"))props.delItem(d.id)}}>🗑️</button>
          </td>}
        </tr> })}
        {data.length===0&&<tr><td colSpan={props.isBio?7:6} style={{textAlign:"center",color:"var(--text3)",padding:"40px"}}>Aucun résultat</td></tr>}
      </tbody></table></div>
      {detail && <div className="det-overlay" onClick={function(e){if(e.target===e.currentTarget)setDetail(null)}}>
        <div className="det-box">
          <h3>♻️ {detail.id} — Détails réforme</h3>
          <div className="det-grid">
            <div className="det-item"><div className="det-label">Référence</div><div className="det-val" style={{color:"#a78bfa"}}>{detail.id}</div></div>
            <div className="det-item"><div className="det-label">Date</div><div className="det-val">{detail.date}</div></div>
            <div className="det-item"><div className="det-label">Service</div><div className="det-val">{svLabel(detail.service)}</div></div>
            <div className="det-item"><div className="det-label">Demandeur</div><div className="det-val">{detail.who||"—"}</div></div>
            <div className="det-item"><div className="det-label">Équipement</div><div className="det-val">{detail.eq||"—"}</div></div>
            <div className="det-item"><div className="det-label">Statut</div><div className="det-val">{window.STL[detail.statut]||detail.statut}</div></div>
            <div className="det-item"><div className="det-label">Marque</div><div className={detail.eqMarque?"det-val":"det-val empty"}>{detail.eqMarque||"—"}</div></div>
            <div className="det-item"><div className="det-label">Modèle</div><div className={detail.eqModel?"det-val":"det-val empty"}>{detail.eqModel||"—"}</div></div>
            <div className="det-item"><div className="det-label">N° Série</div><div className={detail.eqSerie?"det-val":"det-val empty"}>{detail.eqSerie||"—"}</div></div>
            <div className="det-item"><div className="det-label">N° Inventaire</div><div className="det-val green">{detail.eqInv||"—"}</div></div>
            <div className="det-item full"><div className="det-label">Motif de la réforme</div><div className={detail.motif?"det-val":"det-val empty"}>{detail.motif||"Non renseigné"}</div></div>
          </div>
          <div style={{textAlign:"center"}}><button className="det-close" onClick={function(){setDetail(null)}}>Fermer</button></div>
        </div>
      </div>}
    </div>
  );
}

function App() {
  var [user,setUser]=useState(null);
  var [lu,setLu]=useState(""); var [lp,setLp]=useState(""); var [lerr,setLerr]=useState("");
  var [page,setPage]=useState("demande");
  var [svc,setSvc]=useState(null); var [urgLvl,setUrgLvl]=useState("Normale");
  var [fSvc,setFSvc]=useState("all"); var [fSt,setFSt]=useState("all");
  var [ok,setOk]=useState(false);
  var [modal,setModal]=useState(null); var [editEq,setEditEq]=useState(null); var [eqFilter,setEqFilter]=useState("");

  // Persisted state (Firebase or localStorage)
  var [eqDb,setEqDb,eqLoaded]=usePersistedState("equipment", window.INIT_EQ);
  var [dems,setDems,demLoaded]=usePersistedState("demandes", []);
  var [pans,setPans,panLoaded]=usePersistedState("pannes", []);
  var [refs,setRefs,refLoaded]=usePersistedState("reformes", []);
  var [counter,setCounter,cntLoaded]=usePersistedState("counter", {dem:0,pan:0,ref:0});

  // Form states
  var [fNom,setFNom]=useState(""); var [fFunc,setFFunc]=useState(""); var [fDesig,setFDesig]=useState("");
  var [fQte,setFQte]=useState("1"); var [fType,setFType]=useState(""); var [fMarque,setFMarque]=useState("");
  var [fJustif,setFJustif]=useState(""); var [fTech,setFTech]=useState(""); var [fAccess,setFAccess]=useState("");
  var [pNom,setPNom]=useState(""); var [pFunc,setPFunc]=useState(""); var [pDesc,setPDesc]=useState(""); var [pSelEq,setPSelEq]=useState(null);
  var [rNom,setRNom]=useState(""); var [rFunc,setRFunc]=useState(""); var [rMotif,setRMotif]=useState(""); var [rSelEq,setRSelEq]=useState(null);

  var isBio=user&&user.role==="biomed";
  var allLoaded=eqLoaded&&demLoaded&&panLoaded&&refLoaded&&cntLoaded;

  function doLogin(){ if(lu.toLowerCase()==="biomed"&&lp==="chptata2026"){setUser({role:"biomed",name:"Service Biomédical"});setLerr("")}else{setLerr("Identifiant ou mot de passe incorrect")} }
  function navTo(p){setPage(p);setFSvc("all");setFSt("all");window.scrollTo({top:0})}

  function submitDemande(){
    if(!svc||!fNom||!fDesig){alert("Veuillez remplir le service, le nom et la désignation.");return}
    var nc=Object.assign({},counter,{dem:counter.dem+1}); setCounter(nc);
    var id="DEM-2026-"+String(nc.dem).padStart(3,"0");
    var today=new Date().toISOString().slice(0,10);
    setDems(dems.concat([{id:id,service:svc,eq:fDesig,marque:fMarque,statut:"soumise",urg:urgLvl,date:today,who:fNom+" ("+fFunc+")",qte:fQte,type:fType,justif:fJustif,tech:fTech,access:fAccess}]));
    var svName=(window.SVCS.find(function(x){return x.id===svc})||{}).label||svc;
    window.sendNotif("Nouvelle demande d'équipement", {id:id,date:today,serviceName:svName,eq:fDesig,desc:fJustif,urg:urgLvl,who:fNom+" ("+fFunc+")",marque:fMarque});
    setOk(true);setTimeout(function(){setOk(false)},3000);
    setFNom("");setFFunc("");setFDesig("");setFQte("1");setFType("");setFMarque("");setFJustif("");setFTech("");setFAccess("");setUrgLvl("Normale");setSvc(null);
    window.scrollTo({top:0});
  }
  function submitPanne(){
    if(!svc||!pNom||!pSelEq){alert("Veuillez remplir le service, le nom et sélectionner un équipement.");return}
    var nc=Object.assign({},counter,{pan:counter.pan+1}); setCounter(nc);
    var id="PAN-2026-"+String(nc.pan).padStart(3,"0");
    var today=new Date().toISOString().slice(0,10);
    setPans(pans.concat([{id:id,service:svc,eq:pSelEq.e||pSelEq.i||"Inconnu",panne:pDesc||"Non précisée",statut:"en_attente",urg:urgLvl,date:today,who:pNom+" ("+pFunc+")",eqMarque:pSelEq.m||"",eqModel:pSelEq.o||"",eqSerie:pSelEq.r||"",eqInv:pSelEq.i||"",eqService:pSelEq.s||""}]));
    var svName=(window.SVCS.find(function(x){return x.id===svc})||{}).label||svc;
    window.sendNotif("Signalement de panne", {id:id,date:today,serviceName:svName,eq:pSelEq.e||pSelEq.i||"Inconnu",desc:pDesc||"Non précisée",urg:urgLvl,who:pNom+" ("+pFunc+")"});
    setOk(true);setTimeout(function(){setOk(false)},3000);
    setPNom("");setPFunc("");setPDesc("");setPSelEq(null);setUrgLvl("Normale");setSvc(null);
    window.scrollTo({top:0});
  }
  function submitReforme(){
    if(!svc||!rNom||!rSelEq){alert("Veuillez remplir le service, le nom et sélectionner un équipement.");return}
    var nc=Object.assign({},counter,{ref:(counter.ref||0)+1}); setCounter(nc);
    var id="REF-2026-"+String(nc.ref).padStart(3,"0");
    var today=new Date().toISOString().slice(0,10);
    setRefs(refs.concat([{id:id,service:svc,eq:rSelEq.e||rSelEq.i||"Inconnu",motif:rMotif||"Non précisé",statut:"soumise",date:today,who:rNom+" ("+rFunc+")",eqMarque:rSelEq.m||"",eqModel:rSelEq.o||"",eqSerie:rSelEq.r||"",eqInv:rSelEq.i||"",eqService:rSelEq.s||""}]));
    var svName=(window.SVCS.find(function(x){return x.id===svc})||{}).label||svc;
    window.sendNotif("Demande de réforme", {id:id,date:today,serviceName:svName,eq:rSelEq.e||rSelEq.i||"Inconnu",desc:rMotif||"Non précisé",urg:"Normale",who:rNom+" ("+rFunc+")"});
    setOk(true);setTimeout(function(){setOk(false)},3000);
    setRNom("");setRFunc("");setRMotif("");setRSelEq(null);setSvc(null);
    window.scrollTo({top:0});
  }
  function saveEq(){
    if(!editEq)return; var obj={s:editEq.s,e:editEq.e,m:editEq.m,o:editEq.o,r:editEq.r,i:editEq.i};
    if(editEq._idx!==undefined){var n=eqDb.slice();n[editEq._idx]=obj;setEqDb(n)}else{setEqDb(eqDb.concat([obj]))}
    setModal(null);setEditEq(null);
  }
  var filtEq=useMemo(function(){if(!eqFilter)return eqDb;var lo=eqFilter.toLowerCase();return eqDb.filter(function(eq){return[eq.s,eq.e,eq.m,eq.o,eq.r,eq.i].some(function(f){return f&&f.toLowerCase().indexOf(lo)>=0})})},[eqDb,eqFilter]);
  var urgCls=function(u){if(urgLvl!==u)return"ub";if(u==="Normale")return"ub ag";if(u==="Urgente")return"ub aa";return"ub ar"};
  var noFb=!window.firebaseReady;

  if(!user) return (
    <div className="login-wrap"><div className="login-box">
      <div className="logo-big">⊕</div><h1>Portail Biomédical</h1><div className="sub">CHP Tata — Authentification</div>

      <input className="lf" type="password" placeholder="Mot de passe" value={lp} onChange={function(e){setLp(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")doLogin()}} />
      <button className="lb" onClick={doLogin}>🔒 Connexion Biomédical</button>
      {lerr&&<div className="lerr">{lerr}</div>}
      <div style={{margin:"20px 0",color:"var(--text3)",fontSize:"12px"}}>— ou —</div>
      <button className="lb2" onClick={function(){setUser({role:"service",name:"Utilisateur Service"})}}>👤 Accès Service (sans compte)</button>
      <div className="lhint"><b>Biomédical :</b> accès complet<br/><b>Service :</b> formulaires uniquement</div>
      {noFb&&<div style={{marginTop:"16px",padding:"10px",borderRadius:"8px",background:"var(--amber2)",color:"var(--amber)",fontSize:"11px"}}>⚠ Firebase non configuré — données stockées localement dans ce navigateur</div>}
      {!window.emailReady&&<div style={{marginTop:"8px",padding:"10px",borderRadius:"8px",background:"var(--blue2)",color:"var(--blue)",fontSize:"11px"}}>📧 EmailJS non configuré — pas de notifications email</div>}
    </div></div>
  );

  if(!allLoaded) return <div className="loading"><div className="spin"></div><div>Chargement des données...</div></div>;

  var navItems=[{id:"demande",label:"Nouvelle demande",ic:"＋"},{id:"panne",label:"Signaler panne",ic:"⚠"},{id:"reforme",label:"Réforme",ic:"♻️"}];
  navItems.push({id:"suivi_demandes",label:"Suivi demandes"+(isBio?" ("+dems.length+")":""),ic:"📋"});
  navItems.push({id:"suivi_pannes",label:"Suivi pannes"+(isBio?" ("+pans.length+")":""),ic:"🔧"});
  navItems.push({id:"suivi_reformes",label:"Suivi réformes"+(isBio?" ("+refs.length+")":""),ic:"♻️"});
  if(isBio){navItems.push({id:"inventaire",label:"Inventaire",ic:"🗄️"})}

  return (

          <nav className="nav">{navItems.map(function(n){return <button key={n.id} className={"nb"+(page===n.id?" ac":"")} onClick={function(){navTo(n.id)}}>{n.ic} {n.label}</button>})}</nav>
          <div className="ui"><span className="rl">{isBio?"🔧 Biomédical":"👤 Service"}</span><span>{user.name}</span><button className="lo" onClick={function(){setUser(null);setLu("");setLp("");setPage("demande")}}>Déconnexion</button></div>
        </div>
      </header>
      <main className="mn">
        {noFb&&isBio&&<div className="cfg-banner">⚠ <b>Firebase non configuré</b> — les données sont stockées dans <code>localStorage</code> (ce navigateur uniquement).<br/>Pour synchroniser entre plusieurs appareils, configure Firebase dans le fichier HTML (voir les instructions).</div>}

        {page==="demande"&&<div>
          <div className="ph"><span className="pb pb-g">● Formulaire de demande</span><h2>Soumettre un besoin en équipement</h2><p>Traitement sous 24h.</p></div>
          {ok&&<div className="suc">✓ Demande soumise avec succès !</div>}
          <div className="cd"><div className="st"><span className="sn">1</span> Service</div><div className="sg">{window.SVCS.map(function(s){return <div key={s.id} className={"sb"+(svc===s.id?" ac":"")} onClick={function(){setSvc(s.id)}}><div className="si">{s.icon}</div><div className="sl">{s.label}</div></div>})}</div></div>
          <div className="cd"><div className="st"><span className="sn">2</span> Identification</div><div className="fg"><div className="fi"><label>Nom</label><input value={fNom} onChange={function(e){setFNom(e.target.value)}} placeholder="Dr. / M. / Mme ..."/></div><div className="fi"><label>Fonction</label><input value={fFunc} onChange={function(e){setFFunc(e.target.value)}} placeholder="Médecin, Infirmier..."/></div></div></div>
          <div className="cd"><div className="st"><span className="sn">3</span> Équipement demandé</div><div className="fg">
            <div className="fi"><label>Désignation</label><input value={fDesig} onChange={function(e){setFDesig(e.target.value)}} placeholder="Ex: Ventilateur..."/></div>
            <div className="fi"><label>Quantité</label><input value={fQte} onChange={function(e){setFQte(e.target.value)}} type="number" placeholder="1"/></div>

            <div className="fi"><label>Marque / Modèle</label><input value={fMarque} onChange={function(e){setFMarque(e.target.value)}} placeholder="Ex: Mindray..."/></div>
            <div className="fi ff"><label>Justification</label><textarea value={fJustif} onChange={function(e){setFJustif(e.target.value)}} placeholder="Besoin clinique..."></textarea></div>
          </div></div>
          <div className="cd"><div className="st"><span className="sn">4</span> Caractéristiques techniques <span className="ob">Optionnel</span></div><div className="fg">
            <div className="fi ff"><label>Description technique</label><textarea style={{minHeight:"100px"}} value={fTech} onChange={function(e){setFTech(e.target.value)}} placeholder="Alimentation, puissance, normes, connectivité..."></textarea></div>
            <div className="fi ff"><label>Accessoires requis</label><textarea value={fAccess} onChange={function(e){setFAccess(e.target.value)}} placeholder="Sondes, câbles, batteries, manuels..."></textarea></div>
          </div></div>
          <div className="cd"><div className="st"><span className="sn">5</span> Niveau d'urgence</div><div className="ug">{["Normale","Urgente","Critique"].map(function(u){return <button key={u} className={urgCls(u)} onClick={function(){setUrgLvl(u)}}>{u}</button>})}</div></div>
          <button className="sbm" onClick={submitDemande}>Soumettre la demande</button>
        </div>}

        {page==="panne"&&<div>
          <div className="ph"><span className="pb pb-r">⚠ Signalement de panne</span><h2>Signaler une panne</h2><p>{eqDb.length} équipements dans la base.</p></div>
          {ok&&<div className="suc">✓ Panne signalée avec succès !</div>}
          <div className="cd"><div className="st"><span className="sn">1</span> Service</div><div className="sg">{window.SVCS.filter(function(s){return s.dbKey}).map(function(s){var cnt=eqDb.filter(function(eq){return eq.s===s.dbKey}).length;return <div key={s.id} className={"sb"+(svc===s.id?" ac":"")} onClick={function(){setSvc(s.id);setPSelEq(null)}}><div className="si">{s.icon}</div><div className="sl">{s.label}</div><div className="sc">{cnt} éq.</div></div>})}</div></div>
          <div className="cd"><div className="st"><span className="sn">2</span> Identification</div><div className="fg"><div className="fi"><label>Nom</label><input value={pNom} onChange={function(e){setPNom(e.target.value)}} placeholder="Dr. / M. / Mme ..."/></div><div className="fi"><label>Fonction</label><input value={pFunc} onChange={function(e){setPFunc(e.target.value)}} placeholder="Médecin, Infirmier..."/></div></div></div>
          <div className="cd"><div className="st"><span className="sn">3</span> Équipement en panne</div><EqSearch selSvc={svc} db={eqDb} onPick={function(eq){setPSelEq(eq)}}/></div>
          <div className="cd"><div className="st"><span className="sn">4</span> Description de la panne</div><div className="fi"><textarea style={{minHeight:"100px"}} value={pDesc} onChange={function(e){setPDesc(e.target.value)}} placeholder="Symptômes, codes d'erreur..."></textarea></div></div>
          <div className="cd"><div className="st"><span className="sn">5</span> Priorité</div><div className="ug">{["Normale","Urgente","Critique"].map(function(u){return <button key={u} className={urgCls(u)} onClick={function(){setUrgLvl(u)}}>{u}</button>})}</div></div>
          <button className="sbm" onClick={submitPanne}>Signaler la panne</button>
        </div>}

        {page==="suivi_demandes"&&
          <SuiviPage isPanne={false} dems={dems} pans={pans} fSvc={fSvc} fSt={fSt} setFSvc={setFSvc} setFSt={setFSt} isBio={isBio} chgSt={function(id,ns){setDems(dems.map(function(d){return d.id===id?Object.assign({},d,{statut:ns}):d}))}} delItem={function(id){setDems(dems.filter(function(d){return d.id!==id}))}}/>
        }

        {page==="suivi_pannes"&&
          <SuiviPage isPanne={true} dems={dems} pans={pans} fSvc={fSvc} fSt={fSt} setFSvc={setFSvc} setFSt={setFSt} isBio={isBio} chgSt={function(id,ns){setPans(pans.map(function(d){return d.id===id?Object.assign({},d,{statut:ns}):d}))}} delItem={function(id){setPans(pans.filter(function(d){return d.id!==id}))}}/>
        }

        {page==="reforme"&&<div>
          <div className="ph"><span className="pb" style={{background:"#7c3aed20",color:"#a78bfa"}}>♻️ Demande de réforme</span><h2>Déclasser un équipement</h2><p>Sélectionnez l'équipement à réformer.</p></div>
          {ok&&<div className="suc">✓ Demande de réforme soumise avec succès !</div>}
          <div className="cd"><div className="st"><span className="sn">1</span> Service</div><div className="sg">{window.SVCS.filter(function(s){return s.dbKey}).map(function(s){var cnt=eqDb.filter(function(eq){return eq.s===s.dbKey}).length;return <div key={s.id} className={"sb"+(svc===s.id?" ac":"")} onClick={function(){setSvc(s.id);setRSelEq(null)}}><div className="si">{s.icon}</div><div className="sl">{s.label}</div><div className="sc">{cnt} éq.</div></div>})}</div></div>
          <div className="cd"><div className="st"><span className="sn">2</span> Identification</div><div className="fg"><div className="fi"><label>Nom</label><input value={rNom} onChange={function(e){setRNom(e.target.value)}} placeholder="Dr. / M. / Mme ..."/></div><div className="fi"><label>Fonction</label><input value={rFunc} onChange={function(e){setRFunc(e.target.value)}} placeholder="Médecin, Infirmier, Technicien..."/></div></div></div>
          <div className="cd"><div className="st"><span className="sn">3</span> Équipement à réformer</div><EqSearch selSvc={svc} db={eqDb} onPick={function(eq){setRSelEq(eq)}}/></div>
          <div className="cd"><div className="st"><span className="sn">4</span> Motif de la réforme</div><div className="fi"><textarea style={{minHeight:"100px"}} value={rMotif} onChange={function(e){setRMotif(e.target.value)}} placeholder="Décrivez le motif : vétusté, obsolescence, irréparable, non conforme aux normes, coût de réparation trop élevé, remplacement prévu..."></textarea></div></div>
          <button className="sbm" style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)"}} onClick={submitReforme}>Soumettre la demande de réforme</button>
        </div>}

        {page==="suivi_reformes"&&
          <SuiviReforme refs={refs} fSvc={fSvc} fSt={fSt} setFSvc={setFSvc} setFSt={setFSt} isBio={isBio}
            chgSt={function(id,ns){setRefs(refs.map(function(d){return d.id===id?Object.assign({},d,{statut:ns}):d}))}}
            delItem={function(id){setRefs(refs.filter(function(d){return d.id!==id}))}} />
        }

        {page==="inventaire"&&isBio&&<div>
          <div className="ph"><span className="pb pb-p">🗄️ Base de données</span><h2>Inventaire ({eqDb.length} équipements)</h2></div>
          <div className="ab">
            <button className="pr" onClick={function(){setEditEq({s:window.SKS[0],e:"",m:"",o:"",r:"",i:""});setModal("edit")}}>＋ Ajouter</button>
            <button onClick={function(){
              var wb=XLSX.utils.book_new();
              var header=[["Centre Hospitalier Provincial de Tata — CHP Tata"],["Ministère de la Santé et de la Protection Sociale"],[""],["Inventaire des Équipements Biomédicaux"],["Date d'export: "+new Date().toISOString().slice(0,10),"","","Total: "+eqDb.length+" équipements"],[""]];
              var cols=["Service","Équipement","Marque","Modèle","N° Série","N° Inventaire"];
              var rows=eqDb.map(function(eq){return[eq.s,eq.e,eq.m,eq.o,eq.r,eq.i]});
              var ws=XLSX.utils.aoa_to_sheet(header.concat([cols]).concat(rows));
              ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}},{s:{r:3,c:0},e:{r:3,c:5}}];
              ws["!cols"]=[{wch:24},{wch:40},{wch:20},{wch:22},{wch:22},{wch:20}];
              XLSX.utils.book_append_sheet(wb,ws,"Inventaire");XLSX.writeFile(wb,"Inventaire_CHP_Tata_"+new Date().toISOString().slice(0,10)+".xlsx")
            }}>📥 Excel</button>
          </div>
          <div className="cd">
            <input className="sin" style={{paddingLeft:"14px",marginBottom:"12px"}} placeholder={"Rechercher dans "+eqDb.length+" équipements..."} value={eqFilter} onChange={function(e){setEqFilter(e.target.value)}}/>
            <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:"10px"}}>{filtEq.length} résultat(s)</div>
            <div className="etw"><table className="etb"><thead><tr><th>Service</th><th>Équipement</th><th>Marque</th><th>Modèle</th><th>N° Série</th><th>N° Inv.</th><th>Actions</th></tr></thead><tbody>
              {filtEq.map(function(eq){var ri=eqDb.indexOf(eq);return <tr key={ri+"_"+eq.i}>
                <td><span className="svt">{eq.s}</span></td><td style={{fontWeight:600,color:"var(--text)"}}>{eq.e||"—"}</td><td>{eq.m||"—"}</td><td>{eq.o||"—"}</td>
                <td style={{fontFamily:"monospace",fontSize:"11px"}}>{eq.r||"—"}</td><td style={{color:"var(--green)",fontWeight:700,fontSize:"12px"}}>{eq.i||"—"}</td>
                <td><button style={{padding:"4px 10px",fontSize:"11px",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text2)",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",marginRight:"4px"}} onClick={function(){setEditEq(Object.assign({},eq,{_idx:ri}));setModal("edit")}}>✏️</button><button style={{padding:"4px 10px",fontSize:"11px",border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text2)",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit"}} onClick={function(){setEditEq(Object.assign({},eq,{_idx:ri}));setModal("delete")}}>🗑️</button></td>
              </tr>})}
            </tbody></table></div>
          </div>
        </div>}
      </main>
      <footer className="ft">© 2026 CHP Tata — Service Biomédical · {eqDb.length} éq. · {window.firebaseReady?"🟢 Firebase":"🟡 localStorage"} · {window.emailReady?"📧 Email actif":"📧 Email off"}</footer>

      {modal==="edit"&&editEq&&<div className="mo" onClick={function(e){if(e.target===e.currentTarget)setModal(null)}}><div className="mb">
        <h3>{editEq._idx!==undefined?"Modifier":"Ajouter"} un équipement</h3>
        <div className="fg">
          <div className="fi ff"><label>Service</label><select value={editEq.s} onChange={function(e){setEditEq(Object.assign({},editEq,{s:e.target.value}))}}>{window.SKS.map(function(s){return <option key={s} value={s}>{s}</option>})}</select></div>
          <div className="fi"><label>Désignation</label><input value={editEq.e} onChange={function(e){setEditEq(Object.assign({},editEq,{e:e.target.value}))}}/></div>
          <div className="fi"><label>Marque</label><input value={editEq.m} onChange={function(e){setEditEq(Object.assign({},editEq,{m:e.target.value}))}}/></div>
          <div className="fi"><label>Modèle</label><input value={editEq.o} onChange={function(e){setEditEq(Object.assign({},editEq,{o:e.target.value}))}}/></div>
          <div className="fi"><label>N° Série</label><input value={editEq.r} onChange={function(e){setEditEq(Object.assign({},editEq,{r:e.target.value}))}}/></div>
          <div className="fi"><label>N° Inventaire</label><input value={editEq.i} onChange={function(e){setEditEq(Object.assign({},editEq,{i:e.target.value}))}}/></div>
        </div>
        <div className="ma"><button className="mc" onClick={function(){setModal(null)}}>Annuler</button>{editEq._idx!==undefined&&<button className="md" onClick={function(){setModal("delete")}}>Supprimer</button>}<button className="ms" onClick={saveEq}>Enregistrer</button></div>
      </div></div>}

      {modal==="delete"&&editEq&&<div className="mo" onClick={function(e){if(e.target===e.currentTarget)setModal(null)}}><div className="mb" style={{maxWidth:"420px"}}>
        <h3>⚠️ Confirmer la suppression</h3>
        <p style={{color:"var(--text2)",fontSize:"14px",margin:"12px 0"}}>Supprimer <strong style={{color:"var(--text)"}}>{editEq.e||editEq.i||"cet équipement"}</strong> ?</p>
        <div className="ma"><button className="mc" onClick={function(){setModal(null)}}>Annuler</button><button className="md" onClick={function(){setEqDb(eqDb.filter(function(_,i){return i!==editEq._idx}));setModal(null);setEditEq(null)}}>Supprimer</button></div>
      </div></div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
